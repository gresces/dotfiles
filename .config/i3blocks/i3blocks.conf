# i3blocks configuration file
#
# The i3blocks man page describes the usage of the binary,
# and its website describes the configuration:
#
#     https://vivien.github.io/i3blocks

# Global properties
separator=true
separator_block_width=15

# Guess the weather hourly
[weather]
command=curl -Ss 'https://wttr.in?0&T&Q/Jincheng' | cut -c 16- | head -2 | xargs echo
interval=3600
color=#A4C2F4

# Query my default IP address only on startup
[wifi]
command=nmcli | awk '/wlo1/&&/connected to/ {print $4}'
interval=once
color=#fff

[ip]
command=ip a | awk '/wlo1/ && /inet/{print $2}' | awk -F "/" '{print $1}' 
interval=once
color=#fff

[rofi-calendar]
command=/home/gresces/.config/script/i3blocks/rofi-calendar
interval=3600
BAR_POSITION=top
WEEK_START=monday
DATEFTM=+%Y-%m-%d
#SHORTFMT=+%d/%m/%Y
#LABEL=
FONT=Monospace 15
LEFTCLICK_PREV_MONTH=true
PREV_MONTH_TEXT= previous month 
NEXT_MONTH_TEXT= next month 
ROFI_CONFIG_FILE=/dev/null

# Update time every 5 seconds
[time]
command=date '+%H:%M:%S'
interval=1
